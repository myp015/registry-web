# Default values for yml config

registry:
  # Docker registry url
  url: 'http://localhost:5000/v2'
  # web registry context path
  # empty string for root context, /app to make web registry accessible on http://host/app
  context_path: ''
  # Trust any SSL certificate when connecting to registry
  trust_any_ssl: false
  #  base64 encoded token for basic authentication
  basic_auth: ''
  # To allow image delete, should be false
  readonly: true
  # Docker registry fqdn
  name: 'localhost:5000'
  # Registry GC command (executed inside registry-web container)
  # Safe example (recommended): /bin/registry garbage-collect /etc/docker/registry/config.yml
  # WARNING: avoid --delete-untagged with multi-arch images, it may remove child manifests.
  gc:
    command: ''
    # Kill GC process if it exceeds timeout seconds
    timeout:
      seconds: 300
  # Authentication settings
  auth:
    # Enable authentication
    enabled: false
    # Allow registry anonymous access
    # allow_anonymous: true # not implemented
    # Token issuer
    # should equals to auth.token.issuer of docker registry
    issuer: 'test-issuer'
    # Private key for token signing
    # certificate used on auth.token.rootcertbundle should signed by this key
    key: /config/auth.key
